[project]
name = "whisper-ui"
version = "0.1.0"
description = "Speech-to-text system using OpenAI Whisper with Streamlit UI, speaker diarization, and Docker GPU support"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.0,<3",
  "pydantic-settings>=2.0,<3",
  "redis>=5.0,<6",
  "rq>=1.16,<2",
]

[project.optional-dependencies]
frontend = ["streamlit>=1.33,<2", "python-docx>=1.0,<2"]
worker = [
  # whisperx is installed separately in Dockerfile (--no-deps) to avoid its
  # torch~=2.8.0 constraint conflicting with the base image's torch 2.10.0.
  # The dependencies below cover whisperx's runtime needs (minus torch/torchaudio).
  "faster-whisper>=1.1.1",
  "ctranslate2>=4.5.0",
  "transformers>=4.48.0",
  "nltk>=3.9.1",
  "numpy>=2.1.0",
  "omegaconf>=2.3.0",
  "pandas>=2.2.3",
  "pyannote.audio>=4.0.0",
  "opencc-python-reimplemented>=0.1.7",
]
dev = ["whisper-ui[frontend]", "pytest>=8.0,<9", "pytest-cov>=5.0,<6"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]
ignore = ["RUF012"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
