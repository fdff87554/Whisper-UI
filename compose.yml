services:
  frontend:
    image: ghcr.io/fdff87554/whisper-ui-frontend:${WHISPER_UI_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    ports:
      - "8080:8000"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - DATABASE_PATH=/app/data/db/whisper_ui.db
      - UPLOAD_DIR=/app/data/uploads
      - OUTPUT_DIR=/app/data/outputs
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - LANGUAGE=${LANGUAGE:-zh}
      - HF_TOKEN=${HF_TOKEN:-}
      # Queue / job timeouts — see README "Queue / Timeout tuning".
      # When changing any of these, keep the invariants:
      #   0 < JOB_TIMEOUT_FLOOR <= JOB_TIMEOUT_DEFAULT <= JOB_TIMEOUT_MAX
      #   REDIS_PROCESSING_EXPIRY >= JOB_TIMEOUT_MAX + STALE_JOB_BUFFER
      - JOB_TIMEOUT_DEFAULT=${JOB_TIMEOUT_DEFAULT:-7200}
      - JOB_TIMEOUT_FLOOR=${JOB_TIMEOUT_FLOOR:-1800}
      - JOB_TIMEOUT_AUDIO_MULTIPLIER=${JOB_TIMEOUT_AUDIO_MULTIPLIER:-3.0}
      - JOB_TIMEOUT_MAX=${JOB_TIMEOUT_MAX:-28800}
      - STALE_JOB_BUFFER=${STALE_JOB_BUFFER:-1800}
      - REDIS_PROCESSING_EXPIRY=${REDIS_PROCESSING_EXPIRY:-30600}
      - DIARIZE_HEARTBEAT_INTERVAL=${DIARIZE_HEARTBEAT_INTERVAL:-30}
      # Optional LLM text correction (Ollama). Empty string disables the
      # feature globally and greys out the upload-form toggle.
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
    volumes:
      - app-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass "${REDIS_PASSWORD}"}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "${REDIS_PASSWORD:+REDISCLI_AUTH=\"${REDIS_PASSWORD}\"} redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  worker-gpu:
    profiles: [gpu]
    image: ghcr.io/fdff87554/whisper-ui-worker:${WHISPER_UI_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - DATABASE_PATH=/app/data/db/whisper_ui.db
      - UPLOAD_DIR=/app/data/uploads
      - OUTPUT_DIR=/app/data/outputs
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - COMPUTE_TYPE=${COMPUTE_TYPE:-int8_float16}
      - DEVICE=cuda
      - BATCH_SIZE=${BATCH_SIZE:-4}
      - LANGUAGE=${LANGUAGE:-zh}
      - HF_TOKEN=${HF_TOKEN:-}
      - YOUTUBE_MAX_DURATION=${YOUTUBE_MAX_DURATION:-14400}
      # Queue / job timeouts — see README "Queue / Timeout tuning".
      - JOB_TIMEOUT_DEFAULT=${JOB_TIMEOUT_DEFAULT:-7200}
      - JOB_TIMEOUT_FLOOR=${JOB_TIMEOUT_FLOOR:-1800}
      - JOB_TIMEOUT_AUDIO_MULTIPLIER=${JOB_TIMEOUT_AUDIO_MULTIPLIER:-3.0}
      - JOB_TIMEOUT_MAX=${JOB_TIMEOUT_MAX:-28800}
      - STALE_JOB_BUFFER=${STALE_JOB_BUFFER:-1800}
      - REDIS_PROCESSING_EXPIRY=${REDIS_PROCESSING_EXPIRY:-30600}
      - DIARIZE_HEARTBEAT_INTERVAL=${DIARIZE_HEARTBEAT_INTERVAL:-30}
      # Optional LLM text correction (Ollama).
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      - OLLAMA_REQUEST_TIMEOUT=${OLLAMA_REQUEST_TIMEOUT:-120}
      - LLM_CHUNK_SIZE=${LLM_CHUNK_SIZE:-8}
      - LLM_CHUNK_CONTEXT=${LLM_CHUNK_CONTEXT:-2}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.1}
    volumes:
      - app-data:/app/data
      - model-cache:/cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${WORKER_GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
    restart: unless-stopped
  worker-cpu:
    profiles: [cpu]
    image: ghcr.io/fdff87554/whisper-ui-worker-cpu:${WHISPER_UI_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.worker.cpu
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - DATABASE_PATH=/app/data/db/whisper_ui.db
      - UPLOAD_DIR=/app/data/uploads
      - OUTPUT_DIR=/app/data/outputs
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - COMPUTE_TYPE=${COMPUTE_TYPE:-int8}
      - DEVICE=cpu
      - BATCH_SIZE=${BATCH_SIZE:-4}
      - LANGUAGE=${LANGUAGE:-zh}
      - HF_TOKEN=${HF_TOKEN:-}
      - YOUTUBE_MAX_DURATION=${YOUTUBE_MAX_DURATION:-14400}
      # Queue / job timeouts — see README "Queue / Timeout tuning".
      - JOB_TIMEOUT_DEFAULT=${JOB_TIMEOUT_DEFAULT:-7200}
      - JOB_TIMEOUT_FLOOR=${JOB_TIMEOUT_FLOOR:-1800}
      - JOB_TIMEOUT_AUDIO_MULTIPLIER=${JOB_TIMEOUT_AUDIO_MULTIPLIER:-3.0}
      - JOB_TIMEOUT_MAX=${JOB_TIMEOUT_MAX:-28800}
      - STALE_JOB_BUFFER=${STALE_JOB_BUFFER:-1800}
      - REDIS_PROCESSING_EXPIRY=${REDIS_PROCESSING_EXPIRY:-30600}
      - DIARIZE_HEARTBEAT_INTERVAL=${DIARIZE_HEARTBEAT_INTERVAL:-30}
      # Optional LLM text correction (Ollama).
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      - OLLAMA_REQUEST_TIMEOUT=${OLLAMA_REQUEST_TIMEOUT:-120}
      - LLM_CHUNK_SIZE=${LLM_CHUNK_SIZE:-8}
      - LLM_CHUNK_CONTEXT=${LLM_CHUNK_CONTEXT:-2}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.1}
    volumes:
      - app-data:/app/data
      - model-cache:/cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
  # Optional bundled Ollama server for LLM text correction. Enable with:
  #   docker compose --profile gpu --profile llm up -d
  # Users who already run Ollama elsewhere should skip this profile and
  # point OLLAMA_BASE_URL at their existing server instead.
  ollama:
    profiles: [llm]
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${OLLAMA_GPU_DEVICE_ID:-1}"]
              capabilities: [gpu]
    restart: unless-stopped
  # One-shot init sidecar: waits until Ollama is healthy, pulls the
  # configured model, then exits. Idempotent — pulling an already-present
  # model is a fast no-op.
  ollama-pull:
    profiles: [llm]
    image: ollama/ollama:latest
    entrypoint: /bin/sh
    command:
      - -c
      - 'OLLAMA_HOST=http://ollama:11434 ollama pull ${OLLAMA_MODEL:-gemma4:e2b}'
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
volumes:
  app-data:
  redis-data:
  model-cache:
  ollama-data:
