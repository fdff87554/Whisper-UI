# Shared blocks (YAML anchors). environment uses map form so services can
# combine these with `<<:` merge keys; a new shared knob is added once here
# instead of once per worker. Values reach a container only when listed —
# compose has no env_file, so a .env value alone never applies. See README.
# Cap the json-file driver so unbounded structured logs cannot fill
# /var/lib/docker on long-running deployments. 20 MB x 5 files per service
# is enough headroom for a few days of forensic context on the small-office
# deployments this profile targets; larger operations should plug a
# centralised log driver via .env override.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"
x-app-depends: &app-depends
  redis:
    condition: service_healthy
  volume-init:
    condition: service_completed_successfully
x-core-env: &core-env
  REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_JSON: ${LOG_JSON:-false}
  DATABASE_PATH: /app/data/db/whisper_ui.db
  UPLOAD_DIR: /app/data/uploads
  OUTPUT_DIR: /app/data/outputs
  LANGUAGE: ${LANGUAGE:-zh}
  # One cap, two consumers: the web tier enforces it on file uploads, the
  # download workers on Google Drive files (which carry no duration metadata
  # for the duration cap to act on).
  MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-2147483648}
# Queue / job timeouts — see README "Queue / Timeout tuning".
# When changing any of these, keep the invariants:
#   0 < JOB_TIMEOUT_FLOOR <= JOB_TIMEOUT_DEFAULT <= JOB_TIMEOUT_MAX
#   REDIS_PROCESSING_EXPIRY >= JOB_TIMEOUT_MAX + STALE_JOB_BUFFER
x-timeout-env: &timeout-env
  JOB_TIMEOUT_DEFAULT: ${JOB_TIMEOUT_DEFAULT:-7200}
  JOB_TIMEOUT_FLOOR: ${JOB_TIMEOUT_FLOOR:-1800}
  JOB_TIMEOUT_AUDIO_MULTIPLIER: ${JOB_TIMEOUT_AUDIO_MULTIPLIER:-3.0}
  JOB_TIMEOUT_MAX: ${JOB_TIMEOUT_MAX:-28800}
  STALE_JOB_BUFFER: ${STALE_JOB_BUFFER:-1800}
  REDIS_PROCESSING_EXPIRY: ${REDIS_PROCESSING_EXPIRY:-30600}
# Optional LLM text correction (Ollama). Empty OLLAMA_BASE_URL disables the
# feature globally.
x-llm-env: &llm-env
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
  OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
  OLLAMA_REQUEST_TIMEOUT: ${OLLAMA_REQUEST_TIMEOUT:-120}
  LLM_CHUNK_SIZE: ${LLM_CHUNK_SIZE:-8}
  LLM_CHUNK_CONTEXT: ${LLM_CHUNK_CONTEXT:-2}
  LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
  OLLAMA_THINK: ${OLLAMA_THINK:-false}
# URL-source download caps. TWITTER_COOKIES_FILE: for X login-walled /
# age-restricted posts, set a container path here and mount the cookies.txt
# there (see .env.example). Empty = anonymous.
x-download-env: &download-env
  YOUTUBE_MAX_DURATION: ${YOUTUBE_MAX_DURATION:-14400}
  TWITTER_MAX_DURATION: ${TWITTER_MAX_DURATION:-14400}
  TWITTER_COOKIES_FILE: ${TWITTER_COOKIES_FILE:-}
# GPU worker resource lifecycle. cuda / rocm workers run rq.SimpleWorker in one
# long-lived process, so the GPU context and mapped runtime libraries stay
# resident until that process exits (per-stage cleanup frees model weights via
# torch.cuda.empty_cache(), but never the context itself). WORKER_MAX_IDLE_TIME
# (seconds) makes the worker self-exit after idling that long; the worker's
# `restart: unless-stopped` then respawns a fresh process, handing the GPU
# memory + RSS back to the OS. 0 disables (the always-resident behaviour). Only
# the GPU workers default it on — CPU/io/llm workers fork per job and already
# release on exit. See README "GPU worker resource lifecycle".
x-gpu-lifecycle-env: &gpu-lifecycle-env
  WORKER_MAX_IDLE_TIME: ${WORKER_MAX_IDLE_TIME:-300}
services:
  frontend:
    image: ghcr.io/fdff87554/whisper-ui-frontend:${WHISPER_UI_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    ports:
      - "8080:8000"
    environment:
      !!merge <<: [*core-env, *timeout-env]
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      HF_TOKEN: ${HF_TOKEN:-}
      DIARIZE_HEARTBEAT_INTERVAL: ${DIARIZE_HEARTBEAT_INTERVAL:-30}
      # LLM correction: the frontend only needs the gate + model name to
      # render the upload-form toggle; the client knobs stay worker-side.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      # Optional upload retention. 0 (default) keeps every upload until the
      # job is explicitly deleted. >0 has the web app hourly reclaim the
      # upload directory of COMPLETED jobs older than that many days.
      UPLOAD_RETENTION_DAYS: ${UPLOAD_RETENTION_DAYS:-0}
      # Auth / session — see README "Multi-user authentication". Leaving
      # SESSION_SECRET empty makes the app fall back to a per-process
      # random secret (logs WARNING) which invalidates every session on
      # restart; set it to a stable value in production:
      #   SESSION_SECRET=$(openssl rand -hex 32)
      SESSION_SECRET: ${SESSION_SECRET:-}
      SESSION_HTTPS_ONLY: ${SESSION_HTTPS_ONLY:-false}
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      MAX_LOGIN_ATTEMPTS_PER_IP: ${MAX_LOGIN_ATTEMPTS_PER_IP:-20}
      LOGIN_LOCKOUT_SECONDS: ${LOGIN_LOCKOUT_SECONDS:-900}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      # Registration gate (frontend-only).
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
    volumes:
      - app-data:/app/data
    depends_on:
      !!merge <<: *app-depends
    restart: unless-stopped
    logging: *default-logging
  redis:
    image: redis:7-alpine
    # maxmemory-policy is hardcoded to noeviction on purpose: this Redis holds
    # only work-queue / DAG state (RQ registries, generation counters, sub-job
    # sets, pipeline context) — none of it is safe to evict, so an eviction
    # policy would silently corrupt the pipeline. Only the cap VALUE is tunable.
    command: redis-server --appendonly yes --maxmemory "${REDIS_MAXMEMORY:-0}" --maxmemory-policy noeviction ${REDIS_PASSWORD:+--requirepass "${REDIS_PASSWORD}"}
    # Pass the password as a container env so the healthcheck references it as a
    # runtime shell variable (the `$$` is compose-escaped to a literal `$`), kept
    # in double quotes. The value is then data the container shell expands, never
    # interpolated into the script text — so a password with shell metacharacters
    # cannot break out (unlike compose-interpolating it into the sh -c string).
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "[ -z \"$$REDIS_PASSWORD\" ] || export REDISCLI_AUTH=\"$$REDIS_PASSWORD\"; redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
  # One-shot init sidecar. The worker/frontend images run as USER 1000, but
  # a named volume can keep root:root ownership inherited from an earlier
  # root-era deployment — the Dockerfile build-time chown only seeds an
  # *empty* volume on its first mount, never a populated one. When that
  # happens app-data fails DB/upload writes, and model-cache floods every
  # job's log with HuggingFace ".no_exist" Permission-denied warnings.
  # Re-own both volumes to uid 1000 before any dependent service starts.
  #
  # Guarded so steady-state restarts cost one stat per volume instead of a
  # full walk: the recursive chown runs only when the volume is not already
  # uid-1000 owned. The chown itself is a metadata-only pass — quick on a
  # local volume, though a very large cache on a slow/network backend adds a
  # one-time startup cost. A volume whose top level is uid 1000 but holds a
  # root-written subdir (e.g. a manual `docker run --user root`) is not
  # self-healed; recover it with a manual chown or `docker volume rm`.
  # No profile: the always-on frontend needs app-data, so this must run in
  # every deployment. ($$ escapes compose variable interpolation.)
  volume-init:
    image: alpine:3
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'for d in /data /cache; do [ "$$(stat -c %u "$$d")" = 1000 ] || chown -R 1000:1000 "$$d"; done'
    volumes:
      - app-data:/data
      - model-cache:/cache
    restart: "no"
  worker-gpu:
    profiles: [gpu]
    image: ghcr.io/fdff87554/whisper-ui-worker:${WHISPER_UI_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        DENO_VERSION: ${DENO_VERSION:-2.8.3}
    environment:
      !!merge <<: [*core-env, *timeout-env, *llm-env, *download-env, *gpu-lifecycle-env]
      # Queues this worker listens on. The default includes every queue so a
      # single-profile `docker compose --profile gpu up` still runs the full
      # pipeline end-to-end. For the scaled topology, set
      # `WORKER_GPU_QUEUES=whisper:gpu default` and add the `io` profile so
      # a dedicated worker-io handles download / preprocess / llm_correction.
      WORKER_QUEUES: ${WORKER_GPU_QUEUES:-whisper:gpu whisper:io whisper:cpu whisper:llm default}
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      COMPUTE_TYPE: ${COMPUTE_TYPE:-int8_float16}
      DEVICE: cuda
      BATCH_SIZE: ${BATCH_SIZE:-4}
      HF_TOKEN: ${HF_TOKEN:-}
      DIARIZE_HEARTBEAT_INTERVAL: ${DIARIZE_HEARTBEAT_INTERVAL:-30}
    volumes:
      - app-data:/app/data
      - model-cache:/cache/huggingface
    depends_on:
      !!merge <<: *app-depends
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${WORKER_GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
    restart: unless-stopped
    logging: *default-logging
  worker-cpu:
    profiles: [cpu]
    image: ghcr.io/fdff87554/whisper-ui-worker-cpu:${WHISPER_UI_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.worker.cpu
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        DENO_VERSION: ${DENO_VERSION:-2.8.3}
    environment:
      !!merge <<: [*core-env, *timeout-env, *llm-env, *download-env]
      # Same broad default as worker-gpu: runs the whole pipeline in a
      # single container when the CPU profile is used alone. Override with
      # `WORKER_CPU_QUEUES=whisper:cpu default` to specialise.
      WORKER_QUEUES: ${WORKER_CPU_QUEUES:-whisper:gpu whisper:io whisper:cpu whisper:llm default}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      COMPUTE_TYPE: ${COMPUTE_TYPE:-int8}
      DEVICE: cpu
      BATCH_SIZE: ${BATCH_SIZE:-4}
      HF_TOKEN: ${HF_TOKEN:-}
      DIARIZE_HEARTBEAT_INTERVAL: ${DIARIZE_HEARTBEAT_INTERVAL:-30}
    volumes:
      - app-data:/app/data
      - model-cache:/cache/huggingface
    depends_on:
      !!merge <<: *app-depends
    restart: unless-stopped
    logging: *default-logging
  # AMD / ROCm worker. Transcription runs on whisper.cpp (HIP); alignment and
  # diarization run on PyTorch-ROCm. Enable with:
  #   docker compose --profile rocm up -d
  # AMD GPUs are passed through via /dev/kfd + /dev/dri and the host's
  # video/render group GIDs — set VIDEO_GID / RENDER_GID to match
  # `getent group video render` on your host (defaults suit a Strix Halo box).
  worker-rocm:
    profiles: [rocm]
    image: ghcr.io/fdff87554/whisper-ui-worker-rocm:${WHISPER_UI_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.worker.rocm
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        AMDGPU_TARGETS: ${AMDGPU_TARGETS:-gfx1151}
        DENO_VERSION: ${DENO_VERSION:-2.8.3}
    environment:
      !!merge <<: [*core-env, *timeout-env, *llm-env, *download-env, *gpu-lifecycle-env]
      WORKER_QUEUES: ${WORKER_ROCM_QUEUES:-whisper:gpu whisper:io whisper:cpu whisper:llm default}
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      DEVICE: rocm
      # CTranslate2 has no ROCm backend; transcribe via whisper.cpp (HIP).
      TRANSCRIBE_BACKEND: whispercpp
      WHISPERCPP_BINARY: ${WHISPERCPP_BINARY:-whisper-cli}
      WHISPERCPP_THREADS: ${WHISPERCPP_THREADS:-0}
      # Hallucination guards: Silero VAD pre-segmentation (model cached on the
      # model-cache volume via HF_HOME) + no cross-window text conditioning.
      WHISPERCPP_VAD: ${WHISPERCPP_VAD:-true}
      WHISPERCPP_VAD_MODEL: ${WHISPERCPP_VAD_MODEL:-ggml-silero-v5.1.2.bin}
      WHISPERCPP_MAX_CONTEXT: ${WHISPERCPP_MAX_CONTEXT:-0}
      HF_TOKEN: ${HF_TOKEN:-}
      DIARIZE_HEARTBEAT_INTERVAL: ${DIARIZE_HEARTBEAT_INTERVAL:-30}
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-993}"
    volumes:
      - app-data:/app/data
      - model-cache:/cache/huggingface
    depends_on:
      !!merge <<: *app-depends
    restart: unless-stopped
    logging: *default-logging
  # Optional IO-dedicated worker for multi-worker topologies. Use it when
  # you want the GPU worker(s) to stay focused on whisper:gpu while a
  # lightweight CPU container handles download / preprocess / llm_correction.
  # Enable with: docker compose --profile gpu --profile io up -d
  # Typically also set WORKER_GPU_QUEUES="whisper:gpu default" so the GPU
  # worker stops picking up IO/CPU jobs itself.
  #
  # The image reuses Dockerfile.worker.cpu: stage_tasks.py imports every
  # PipelineStage at module load time (RQ needs the symbols addressable
  # even on workers that never execute them), so a slim Python-only image
  # would still need torch / whisperx installed. Making the stage imports
  # lazy is a follow-up; until then the IO worker just runs the CPU image
  # with its queue narrowed to whisper:io.
  worker-io:
    profiles: [io]
    image: ghcr.io/fdff87554/whisper-ui-worker-cpu:${WHISPER_UI_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.worker.cpu
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        DENO_VERSION: ${DENO_VERSION:-2.8.3}
    environment:
      # LLM correction runs here when enabled — no GPU required.
      !!merge <<: [*core-env, *timeout-env, *llm-env, *download-env]
      WORKER_QUEUES: ${WORKER_IO_QUEUES:-whisper:io whisper:cpu whisper:llm default}
      DEVICE: cpu
    volumes:
      - app-data:/app/data
    depends_on:
      !!merge <<: *app-depends
    restart: unless-stopped
    logging: *default-logging
  # Dedicated LLM-correction worker (whisper:llm queue only). Enable with
  # `--profile llm-worker` on hosts where the LLM is slow (a big Ollama model)
  # and must NOT block the fast io/cpu finalisation path. Uses the CPU image —
  # the stage only makes HTTP calls to Ollama, so it needs no GPU. When you run
  # it, narrow the other workers off whisper:llm (e.g. set
  # WORKER_IO_QUEUES="whisper:io whisper:cpu default").
  worker-llm:
    profiles: [llm-worker]
    image: ghcr.io/fdff87554/whisper-ui-worker-cpu:${WHISPER_UI_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.worker.cpu
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        DENO_VERSION: ${DENO_VERSION:-2.8.3}
    environment:
      !!merge <<: [*core-env, *timeout-env, *llm-env]
      WORKER_QUEUES: ${WORKER_LLM_QUEUES:-whisper:llm default}
      DEVICE: cpu
    volumes:
      - app-data:/app/data
    depends_on:
      !!merge <<: *app-depends
    restart: unless-stopped
    logging: *default-logging
  # Optional bundled Ollama server for LLM text correction. Enable with:
  #   docker compose --profile gpu --profile llm up -d
  # Users who already run Ollama elsewhere should skip this profile and
  # point OLLAMA_BASE_URL at their existing server instead.
  ollama:
    profiles: [llm]
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${OLLAMA_GPU_DEVICE_ID:-1}"]
              capabilities: [gpu]
    restart: unless-stopped
    logging: *default-logging
  # One-shot init sidecar: waits until Ollama is healthy, pulls the
  # configured model, then exits. Idempotent — pulling an already-present
  # model is a fast no-op.
  ollama-pull:
    profiles: [llm]
    image: ollama/ollama:latest
    # Exec form (no shell): OLLAMA_MODEL reaches `ollama pull` as a single literal
    # argv element, so a model name containing shell metacharacters cannot be
    # parsed as a command. (Quoting it inside a `sh -c` string would not — an
    # embedded `"` closes the quote and injects.)
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama"]
    command: ["pull", "${OLLAMA_MODEL:-gemma4:e4b}"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
  # -- Monitoring profile (minimal): docker compose --profile monitoring up -d
  # Prometheus scrapes the frontend /metrics, the Redis exporter, and the AMD
  # GPU exporter. Keep these on the internal network: /metrics and :9090 have
  # NO auth, so :9090 is bound to 127.0.0.1 and an operator wanting remote
  # access should front them with an authenticated reverse proxy. Grafana
  # dashboards are a documented follow-up. Pin the :latest tags below to a
  # specific digest/version before a production rollout.
  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    logging: *default-logging
  redis-exporter:
    profiles: [monitoring]
    image: oliver006/redis_exporter:latest
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
  # AMD GPU metrics — reuses the same /dev/kfd + /dev/dri passthrough as the
  # ROCm worker. NOTE: rocm/device-metrics-exporter is officially validated on
  # Instinct (MI) GPUs; on a gfx1151 (Strix Halo APU) some fields may be empty.
  # If so, fall back to node_exporter + an `amd-smi metric --json` textfile
  # collector. Verify the image tag + gfx1151 coverage during the 211 rollout.
  gpu-exporter:
    profiles: [monitoring]
    image: rocm/device-metrics-exporter:latest
    # /sys (read-only) is required by device-metrics-exporter for inband-RAS
    # metrics per AMD's docker docs. The :5000 port stays internal — Prometheus
    # scrapes gpu-exporter:5000 over the compose network, not the host.
    volumes:
      - /sys:/sys:ro
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-993}"
    restart: unless-stopped
    logging: *default-logging
volumes:
  app-data:
  redis-data:
  model-cache:
  ollama-data:
  prometheus-data:
