# Development overrides - bind mount source code for live reload
services:
  frontend:
    environment:
      - PYTHONPATH=/app/src
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command:
      - uvicorn
      - whisper_ui.web.app:app
      - --host=0.0.0.0
      - --port=8000
      - --reload
      - --reload-dir=src
  css-watcher:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./src:/app/src
    command: >
      sh -c "npm ci && npx @tailwindcss/cli -i src/whisper_ui/web/static/css/input.css -o src/whisper_ui/web/static/style.css --watch"

  worker-gpu:
    volumes:
      - ./src:/app/src
      - ./data:/app/data
  worker-cpu:
    volumes:
      - ./src:/app/src
      - ./data:/app/data
