name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    # Validate against both Python versions actually shipped in deployment:
    # 3.12 (GPU worker, pinned by pytorch/pytorch base image) and 3.13
    # (frontend / CPU worker / dev). pyproject declares requires-python
    # >=3.12, so this matrix proves the lower bound is real.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Install mise
        uses: jdx/mise-action@v4
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev --frozen --python ${{ matrix.python-version }}
      - name: Lint
        uses: pre-commit/action@v3.0.1
      - name: Unit tests
        run: uv run pytest --tb=short -q
      - name: Audit dependencies for known vulnerabilities
        # Audit is interpreter-independent (it inspects the locked
        # requirements set, not installed bytecode), so we only run it on
        # the 3.13 matrix slot. Running it twice would double SBOM
        # traffic and alert noise without finding anything different.
        #
        # --extra dev transitively pulls in the frontend and worker-llm
        # extras (fastapi / python-docx / httpx) so audit covers the whole
        # web tier. The worker extra's heavy ML deps (transformers /
        # pyannote / faster-whisper) are monitored by Dependabot instead
        # to avoid alert fatigue from upstream-unpatched CVEs.
        #
        # --quiet suppresses uv's progress lines so they cannot leak into
        # stdout and confuse pip-audit's requirements parser.
        if: matrix.python-version == '3.13'
        run: uv export --no-emit-project --extra dev --format requirements-txt --quiet | uv tool run pip-audit -r /dev/stdin --strict
  integration-tests:
    runs-on: ubuntu-latest
    # Same dual-version coverage as lint-and-test. lupa (fakeredis [lua])
    # ships per-cpython-ABI wheels, so 3.12 vs 3.13 must both be exercised
    # against the actual EVAL-based progress reporter code path.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Install mise
        uses: jdx/mise-action@v4
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: uv sync --extra dev --frozen --python ${{ matrix.python-version }}
      - name: Integration tests
        run: uv run pytest -m integration --tb=short -q
  # Catch Dockerfile / dependency-pin regressions at PR time. Docker Publish
  # only runs on push to main, which previously let a Python version mismatch
  # between pyproject.toml and the GPU base image slip into main.
  docker-build-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - docker/Dockerfile.frontend
          - docker/Dockerfile.worker
          - docker/Dockerfile.worker.cpu
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.dockerfile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}
  # Browser-rendered theme/contrast checks (tests/visual). Single Python slot —
  # rendering is interpreter-independent. Needs the compiled stylesheet (built
  # here, since style.css is gitignored) and a headless Chromium.
  visual-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install mise
        uses: jdx/mise-action@v4
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --extra dev --frozen --python 3.13
      - name: Build CSS
        run: mise run css
      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium
      - name: Visual tests
        run: uv run pytest -m visual --tb=short -q
