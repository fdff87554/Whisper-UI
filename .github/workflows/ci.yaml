name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install mise
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: pip install ".[dev]"
      - name: Lint
        run: |
          ruff format --check .
          ruff check .
      - name: Test
        run: python -m pytest --tb=short -q
