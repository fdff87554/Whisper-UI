{% from "_icons.html" import icon_eye, icon_eye_off %}
<!DOCTYPE html>
<html lang="zh-Hant"
      x-data="{ theme: $persist(
        window.matchMedia('(prefers-color-scheme: dark)').matches ? 'whisper-dark' : 'whisper-light'
      ).as('whisper-ui-theme') }"
      :data-theme="theme">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ labels.AUTH_LOGIN_HEADER }} — Whisper UI</title>
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.14.8/dist/cdn.min.js"
          integrity="sha384-9SDdYTFEfclsO6c7hnOgCm3X3Dh5gvAcXtVcEtfgDv/kQkhcBbqAOdEVMLskiSfZ"
          crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"
          integrity="sha384-X9kJyAubVxnP0hcA+AMMs21U445qsnqhnUF8EBlEpP3a42Kh/JwWjlv2ZcvGfphb"
          crossorigin="anonymous"></script>
</head>
<body class="min-h-screen bg-base-100 text-base-content flex items-center justify-center px-4">
  <div class="card bg-base-200 border border-base-300 shadow-sm w-full max-w-md">
    <div class="card-body p-8">
      <h1 class="text-2xl font-medium mb-2">{{ labels.AUTH_LOGIN_HEADER }}</h1>
      <p class="text-sm opacity-60 mb-6">{{ labels.AUTH_LOGIN_DESCRIPTION }}</p>

      {% if error_message %}
      <div class="alert alert-error mb-4" role="alert">
        {{ error_message }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <input type="hidden" name="next" value="{{ next }}">

        <div>
          <label class="label" for="username">
            <span class="label-text">{{ labels.AUTH_USERNAME }}</span>
          </label>
          <input id="username" name="username" type="text" required
                 autocomplete="username"
                 class="input input-bordered w-full"
                 minlength="3" maxlength="32">
        </div>

        <div x-data="{ showPassword: false }">
          <label class="label" for="password">
            <span class="label-text">{{ labels.AUTH_PASSWORD }}</span>
          </label>
          <div class="relative">
            <input id="password" name="password" required
                   :type="showPassword ? 'text' : 'password'"
                   autocomplete="current-password"
                   class="input input-bordered w-full pr-12"
                   minlength="8">
            <button type="button"
                    class="absolute inset-y-0 right-0 px-3 flex items-center opacity-60 hover:opacity-100 focus:opacity-100 focus-visible:opacity-100 transition-opacity"
                    :aria-label="showPassword ? '{{ labels.AUTH_PASSWORD_HIDE }}' : '{{ labels.AUTH_PASSWORD_SHOW }}'"
                    :title="showPassword ? '{{ labels.AUTH_PASSWORD_HIDE }}' : '{{ labels.AUTH_PASSWORD_SHOW }}'"
                    @click="showPassword = !showPassword">
              <template x-if="!showPassword">
                <span>{{ icon_eye("w-4 h-4") }}</span>
              </template>
              <template x-if="showPassword">
                <span>{{ icon_eye_off("w-4 h-4") }}</span>
              </template>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-full">
          {{ labels.AUTH_LOGIN_BUTTON }}
        </button>
      </form>

      <div class="text-center mt-4">
        <a href="/register" class="link link-hover text-sm opacity-70">
          {{ labels.AUTH_REGISTER_LINK }}
        </a>
      </div>
    </div>
  </div>
</body>
</html>
