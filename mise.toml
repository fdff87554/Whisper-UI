[tools]
python = "3.12"
node = "22"
ruff = "0.15.2"
yamlfmt = "0.21.0"
shfmt = "3.12.0"
shellcheck = "0.11.0"
taplo = "0.10.0"
"npm:prettier" = "3.8.1"
"npm:markdownlint-cli2" = "0.21.0"

[env]
_.python.venv = { path = ".venv", create = true }
# Optional: configure pip mirror in .mise.local.toml (not committed)
# PIP_INDEX_URL = "https://pypi.cs.nycu.edu.tw/simple/"

[tasks.css]
run = "npx @tailwindcss/cli -i src/whisper_ui/web/static/css/input.css -o src/whisper_ui/web/static/style.css --minify"
description = "Build production CSS"

[tasks."css:watch"]
run = "npx @tailwindcss/cli -i src/whisper_ui/web/static/css/input.css -o src/whisper_ui/web/static/style.css --watch"
description = "Watch and rebuild CSS on change"
