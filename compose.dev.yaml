# Development overrides - bind mount source code for live reload
services:
  frontend:
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command:
      - uvicorn
      - whisper_ui.web.app:app
      - --host=0.0.0.0
      - --port=8000
      - --reload
      - --reload-dir=src
  worker-gpu:
    volumes:
      - ./src:/app/src
      - ./data:/app/data
  worker-cpu:
    volumes:
      - ./src:/app/src
      - ./data:/app/data
